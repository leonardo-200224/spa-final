<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Rick &amp; Morty — SPA</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="css/styles.css" />
  <script src="https://louisabraham.github.io/nekojs/neko.js" data-autostart=""></script>
</head>
<body>

  <nav class="navbar">
    <div class="navbar__logo">Rick &amp; Morty <span>SPA</span></div>
    <ul class="navbar__links">
      <li><a href="#/personajes" data-link>Personajes</a></li>
      <li><a href="#/episodios"  data-link>Episodios</a></li>
      <li><a href="#/ubicaciones" data-link>Ubicaciones</a></li>
    </ul>
    <div class="navbar__actions">
      <button class="btn btn--primary" id="btn-open-form">+ Crear personaje</button>
    </div>
  </nav>

  <main id="app" class="container"></main>

  <!-- Modal crear / editar personaje -->
  <div id="modal" class="modal hidden">
    <div class="modal__overlay" id="modal-overlay"></div>
    <div class="modal__content">
      <button class="modal__close" id="modal-close">&times;</button>
      <h2 id="modal-title">Crear personaje</h2>
      <div id="form-errors" class="form-errors hidden"></div>
      <div class="form-group">
        <label for="input-name">Nombre *</label>
        <input type="text" id="input-name" placeholder="Ej: Rick Sánchez" autocomplete="off" />
      </div>
      <div class="form-group">
        <label for="input-species">Especie *</label>
        <input type="text" id="input-species" placeholder="Ej: Human" autocomplete="off" />
      </div>
      <div class="form-group">
        <label for="input-gender">Género</label>
        <select id="input-gender">
          <option value="Male">Male</option>
          <option value="Female">Female</option>
          <option value="Genderless">Genderless</option>
          <option value="unknown">Unknown</option>
        </select>
      </div>
      <div class="form-group">
        <label for="input-status">Estado</label>
        <select id="input-status">
          <option value="Alive">Alive</option>
          <option value="Dead">Dead</option>
          <option value="unknown">Unknown</option>
        </select>
      </div>
      <div class="form-group" id="group-image">
        <label for="input-image">URL de imagen</label>
        <input type="text" id="input-image" placeholder="https://..." autocomplete="off" />
      </div>
      <div class="form-actions">
        <button class="btn btn--ghost"   id="btn-cancel">Cancelar</button>
        <button class="btn btn--primary" id="btn-save">Guardar</button>
      </div>
    </div>
  </div>

  <!-- Notificación toast -->
  <div id="toast" class="toast hidden"></div>

  <script type="module" src="js/app.js"></script>
</body>
</html>
